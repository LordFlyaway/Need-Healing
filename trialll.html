<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MediVault — Patient Health Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;transition:background .3s,color .3s}

body.light{
  --bg:#eef5f0;--bg2:#f8fbf9;--surface:#ffffff;--surface2:#eef5f0;--surface3:#e0ede6;
  --nav:#152b1e;--nav2:#0d1f15;--nav-text:#a8d4b8;--nav-active:#7fc99a;
  --primary:#3d7a5a;--primary-h:#2e6347;--accent:#6aad8a;--accent2:#9ecfb0;
  --text:#112218;--text2:#3a5c47;--text3:#6a8c78;
  --border:#c0dac9;--border2:#dceee3;
  --danger:#b85555;--danger-bg:#faeaea;--warn:#a07030;--warn-bg:#fdf3e0;
  --info:#3a6a9a;--info-bg:#e5f0fa;--ok:#3d7a5a;--ok-bg:#e0f0e8;
  --shadow:0 4px 24px rgba(61,122,90,0.10);--shadow2:0 2px 12px rgba(61,122,90,0.07);
}
body.dark{
  --bg:#0b1812;--bg2:#0f1f16;--surface:#152b1e;--surface2:#1a3324;--surface3:#1f3d2a;
  --nav:#08110c;--nav2:#060e09;--nav-text:#7ab890;--nav-active:#7fc99a;
  --primary:#7fc99a;--primary-h:#9adab0;--accent:#5aad7a;--accent2:#3a8a5a;
  --text:#d0eada;--text2:#8abf9a;--text3:#5a8a6a;
  --border:#2a4a36;--border2:#1f3a2a;
  --danger:#e07070;--danger-bg:#2a1010;--warn:#d4944a;--warn-bg:#261800;
  --info:#6aadd4;--info-bg:#0f1f2a;--ok:#7fc99a;--ok-bg:#0f2218;
  --shadow:0 4px 28px rgba(0,0,0,0.45);--shadow2:0 2px 14px rgba(0,0,0,0.35);
}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

.app{display:flex;min-height:100vh;background:var(--bg)}

.sidebar{width:230px;flex-shrink:0;background:var(--nav);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;border-right:1px solid rgba(255,255,255,0.05);z-index:200;transition:background .3s;}
.sidebar-logo{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:12px;}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.logo-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:.3px}
.logo-sub{font-size:10px;color:var(--nav-text);opacity:.6;margin-top:1px}
.sidebar-patient{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:10px;}
.avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;letter-spacing:.5px;}
.pt-name{font-size:13px;font-weight:600;color:#fff}
.pt-id{font-size:10px;color:var(--nav-text);opacity:.6;margin-top:1px}
.sidebar-nav{flex:1;padding:10px}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:10px;margin-bottom:2px;border:none;cursor:pointer;background:transparent;color:var(--nav-text);font-size:13px;font-family:'Outfit',sans-serif;font-weight:400;text-align:left;transition:all .15s;border-left:2px solid transparent;}
.nav-btn:hover{background:rgba(255,255,255,0.06);color:#fff}
.nav-btn.active{background:rgba(127,201,154,0.15);color:var(--nav-active);font-weight:600;border-left:2px solid var(--nav-active);}
.nav-icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,0.07);}
.theme-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,0.07);border:none;color:var(--nav-text);cursor:pointer;font-size:12px;font-family:'Outfit',sans-serif;font-weight:500;transition:background .15s;}
.theme-btn:hover{background:rgba(255,255,255,0.12)}
.main{margin-left:230px;flex:1;padding:28px 30px 48px;min-height:100vh;background:var(--bg)}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;gap:16px;flex-wrap:wrap}
.page-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.page-sub{font-size:13px;color:var(--text3);margin-top:3px}
.header-actions{display:flex;gap:10px;align-items:center}
.card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow2);transition:background .3s,border .3s;}
.card-sm{padding:14px 16px}
.sec-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.flex-col{display:flex;flex-direction:column;gap:12px}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px;}
.badge-ok{background:var(--ok-bg);color:var(--ok)}
.badge-warn{background:var(--warn-bg);color:var(--warn)}
.badge-danger{background:var(--danger-bg);color:var(--danger)}
.badge-info{background:var(--info-bg);color:var(--info)}
.badge-muted{background:var(--surface3);color:var(--text3)}
.btn-primary{padding:9px 20px;border-radius:10px;background:var(--primary);border:none;color:#fff;cursor:pointer;font-size:13px;font-family:'Outfit',sans-serif;font-weight:600;transition:background .15s,transform .1s;}
.btn-primary:hover{background:var(--primary-h)}
.btn-primary:active{transform:scale(.97)}
.btn-outline{padding:7px 16px;border-radius:9px;background:transparent;border:1px solid var(--border);color:var(--primary);cursor:pointer;font-size:12px;font-family:'Outfit',sans-serif;font-weight:600;transition:all .15s;}
.btn-outline:hover{background:var(--surface2)}
.metric-val{font-size:28px;font-weight:800;color:var(--primary);line-height:1;margin-top:6px}
.metric-label{font-size:12px;color:var(--text3);font-weight:500}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--border);cursor:pointer;position:relative;border:none;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--primary)}
.toggle-knob{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
.toggle.on .toggle-knob{left:23px}
.filter-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.filter-pill{padding:5px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-family:'Outfit',sans-serif;font-weight:500;transition:all .15s;}
.filter-pill.active{background:var(--primary);border-color:var(--primary);color:#fff}
.filter-pill:hover:not(.active){background:var(--surface2)}
.record-row{padding:14px 18px;border-radius:14px;background:var(--surface);border:1px solid var(--border2);box-shadow:var(--shadow2);transition:box-shadow .15s;}
.record-row:hover{box-shadow:var(--shadow)}
.vital-card{border-radius:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border2);border-left:3px solid var(--primary);box-shadow:var(--shadow2);}
.vital-card.warn{border-left-color:var(--warn)}
.vital-val{font-size:26px;font-weight:800;color:var(--primary);line-height:1}
.vital-card.warn .vital-val{color:var(--warn)}
.vital-unit{font-size:11px;font-weight:400;color:var(--text3);margin-left:3px}
.vital-label{font-size:11px;color:var(--text3);margin-top:5px}
.bar-chart{display:flex;align-items:flex-end;gap:14px;height:130px;padding-bottom:6px}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-pair{width:100%;display:flex;gap:3px;align-items:flex-end;height:100px}
.bar{border-radius:4px 4px 0 0;transition:opacity .2s}
.bar:hover{opacity:.75}
.bar-label{font-size:10px;color:var(--text3);text-align:center}
.act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.audit-row{display:flex;align-items:center;gap:10px;padding:9px 0}
.audit-row+.audit-row{border-top:1px solid var(--border2)}
.audit-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.info-banner{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;border-radius:14px;background:var(--ok-bg);border:1px solid var(--ok);margin-bottom:20px;}
.check-circle{width:18px;height:18px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid var(--border);background:transparent;transition:all .15s;}
.check-circle.done{background:var(--primary);border-color:var(--primary)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .35s ease both}
.fade-up-1{animation-delay:.05s}.fade-up-2{animation-delay:.1s}.fade-up-3{animation-delay:.15s}.fade-up-4{animation-delay:.2s}
@media(max-width:900px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}}
@media(max-width:640px){.sidebar{width:200px}.main{margin-left:200px;padding:20px 16px 40px}}

.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;position:relative;overflow:hidden;}
.login-page::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(61,122,90,0.12) 0%,transparent 70%);top:-100px;right:-100px;pointer-events:none;}
.login-page::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(106,173,138,0.08) 0%,transparent 70%);bottom:-80px;left:-80px;pointer-events:none;}
.login-box{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border2);border-radius:24px;padding:40px 36px;box-shadow:var(--shadow);position:relative;z-index:1;animation:fadeUp .4s ease both;}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.login-logo-icon{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:22px;}
.login-logo-name{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px}
.login-logo-sub{font-size:11px;color:var(--text3);margin-top:1px}
.login-heading{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px;text-align:center}
.login-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:28px}
.login-field{margin-bottom:16px}
.login-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.3px;}
.login-input{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-family:'Outfit',sans-serif;outline:none;transition:border .15s,box-shadow .15s;}
.login-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(61,122,90,0.12);}
.login-input::placeholder{color:var(--text3)}
.login-input-wrap{position:relative}
.login-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px;display:flex;align-items:center;}
.login-btn{width:100%;padding:12px;border-radius:11px;background:var(--primary);border:none;color:#fff;font-size:14px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;margin-top:8px;transition:background .15s,transform .1s,box-shadow .15s;letter-spacing:.3px;}
.login-btn:hover{background:var(--primary-h);box-shadow:0 4px 16px rgba(61,122,90,0.25)}
.login-btn:active{transform:scale(.98)}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.login-error{display:flex;align-items:center;gap:8px;background:var(--danger-bg);border:1px solid var(--danger);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--danger);animation:fadeUp .2s ease both;}
.login-hint{margin-top:22px;padding-top:18px;border-top:1px solid var(--border2);}
.login-hint-title{font-size:11px;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.8px;text-align:center;}

.logout-btn{display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:var(--nav-text);font-size:12px;font-family:'Outfit',sans-serif;padding:6px 10px;border-radius:7px;transition:background .15s;opacity:.7;}
.logout-btn:hover{background:rgba(255,255,255,0.08);opacity:1}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.shake{animation:shake .35s ease}
</style>
</head>

const VALID_USERS=Object.values(ALL_USERS).map(u=>u.credentials);

const NAV=[
  {id:"dashboard",label:"Dashboard",icon:"◈"},
  {id:"records",label:"Records",icon:"📋"},
  {id:"vitals",label:"Vitals",icon:"📊"},
  {id:"medications",label:"Medications",icon:"💊"},
  {id:"access",label:"Access Control",icon:"🔐"},
];

function LoginPage({onLogin}){
  const [phone,setPhone]=useState("");
  const [otp,setOtp]=useState("");
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);
  const [shaking,setShaking]=useState(false);
  const [mode,setMode]=useState("light");

  useEffect(()=>{document.body.className=mode;},[mode]);

  const shake=()=>{setShaking(true);setTimeout(()=>setShaking(false),400);};

  const handleLogin=()=>{
    if(!phone.trim()){setError("Please enter your phone number.");shake();return;}
    if(!otp.trim()){setError("Please enter your OTP.");shake();return;}
    if(!/^\d{10}$/.test(phone.replace(/\s/g,""))){setError("Please enter a valid 10-digit phone number.");shake();return;}
    if(!/^\d{6}$/.test(otp)){setError("OTP must be 6 digits.");shake();return;}
    setLoading(true);setError("");

    setTimeout(()=>{
      const match=VALID_USERS.find(u=>u.username===phone.replace(/\s/g,""));
      if(match){
        onLogin(match.username);
      } else {
        setError("Invalid phone number or OTP. Please try again.");shake();setLoading(false);
      }
    },800);
  };

  const handlePhoneChange=e=>{
    let val=e.target.value.replace(/\D/g,"").slice(0,10);
    setPhone(val);setError("");
  };

  return(
    <div className="login-page">
      <div className={`login-box ${shaking?"shake":""}`}>
        <div className="login-logo">
          <div className="login-logo-icon">⬡</div>
          <div>
            <div className="login-logo-name">MediVault</div>
            <div className="login-logo-sub">Patient Health Portal</div>
          </div>
        </div>
        <div className="login-heading">Welcome back</div>
        <div className="login-sub">Sign in with your phone number and OTP</div>
        {error&&<div className="login-error"><span style={{fontSize:16}}>⚠</span>{error}</div>}

        <div className="login-field">
          <label className="login-label">PHONE NUMBER</label>
          <div style={{display:"flex",gap:8}}>
            <div style={{
              padding:"11px 12px",borderRadius:10,border:"1px solid var(--border)",
              background:"var(--surface2)",color:"var(--text2)",fontSize:14,
              fontFamily:"'Outfit',sans-serif",fontWeight:600,flexShrink:0
            }}>+91</div>
            <input className="login-input" type="text" inputMode="numeric"
              placeholder="10-digit mobile number"
              value={phone} onChange={handlePhoneChange}
              onKeyDown={e=>{if(e.key==="Enter")handleLogin();}}
              autoComplete="tel" style={{flex:1}}/>
          </div>
        </div>

        <div className="login-field">
          <label className="login-label">OTP</label>
          <input className="login-input" type="text" inputMode="numeric"
            placeholder="Enter 6-digit OTP"
            value={otp} maxLength={6}
            onChange={e=>{setOtp(e.target.value.replace(/\D/g,"").slice(0,6));setError("");}}
            onKeyDown={e=>{if(e.key==="Enter")handleLogin();}}
            autoComplete="one-time-code"
            style={{letterSpacing:"4px",fontSize:18,fontWeight:700}}/>
        </div>

        <button className="login-btn" onClick={handleLogin} disabled={loading}>
          {loading?"Signing in...":"Sign In"}
        </button>

        <div style={{textAlign:"center",marginTop:16}}>
          <button onClick={()=>setMode(m=>m==="light"?"dark":"light")}
            style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"var(--text3)",fontFamily:"'Outfit',sans-serif"}}>
            {mode==="light"?"Switch to Dark Mode":"Switch to Light Mode"}
          </button>
        </div>
      </div>
    </div>
  );
}

function Badge({label,type="muted"}){return <span className={`badge badge-${type}`}>{label}</span>;}
function AvatarEl({initials,size=38,bg}){
  return(
    <div className="avatar" style={{
      width:size,height:size,fontSize:size*.34,
      background:bg||"linear-gradient(135deg,var(--primary),var(--accent))"
    }}>{initials}</div>
  );
}
function Card({children,style,className=""}){return <div className={`card ${className}`} style={style}>{children}</div>;}
function Toggle({on,onToggle}){return(
  <button className={`toggle ${on?"on":""}`} onClick={onToggle}>
    <div className="toggle-knob"/>
  </button>
);}

function Dashboard({data}){
  const {metrics,vitals,activity,patient}=data;
  const metricCards=[
    {label:"Total Records",val:String(metrics.records)},
    {label:"Hospitals Linked",val:String(metrics.hospitals)},
    {label:"Active Medications",val:String(metrics.medications)},
    {label:"Pending Requests",val:String(metrics.pending),color:metrics.pending>0},
  ];
  return(
    <div>
      <div className="grid-4" style={{marginBottom:20}}>
        {metricCards.map((m,i)=>(
          <Card key={m.label} className={`card-sm fade-up fade-up-${i+1}`}>
            <div className="metric-label">{m.label}</div>
            <div className="metric-val" style={m.color?{color:"var(--warn)"}:{}}>{m.val}</div>
          </Card>
        ))}
      </div>
      <div className="grid-2" style={{marginBottom:20}}>
        <Card className="fade-up fade-up-2">
          <div className="sec-title">Vitals Snapshot</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {vitals.slice(0,4).map(v=>(
              <div key={v.label} style={{background:"var(--surface2)",borderRadius:10,padding:"10px 12px",border:"1px solid var(--border2)"}}>
                <div style={{fontSize:18,marginBottom:4}}>{v.icon}</div>
                <div style={{fontSize:20,fontWeight:800,color:v.status==="ok"?"var(--primary)":"var(--warn)",lineHeight:1}}>
                  {v.value}<span style={{fontSize:10,fontWeight:400,color:"var(--text3)",marginLeft:3}}>{v.unit}</span>
                </div>
                <div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>{v.label}</div>
              </div>
            ))}
          </div>
        </Card>
        <Card className="fade-up fade-up-3">
          <div className="sec-title">Recent Activity</div>
          <div className="flex-col" style={{gap:10}}>
            {activity.map((a,i)=>(
              <div key={i} style={{display:"flex",alignItems:"flex-start",gap:10}}>
                <div className="act-dot" style={{background:a.color}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:"var(--text)",lineHeight:1.4}}>{a.msg}</div>
                  <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{a.time}</div>
                </div>
              </div>
            ))}
          </div>
        </Card>
      </div>
      <Card className="fade-up fade-up-4">
        <div className="sec-title">Patient Summary</div>
        <div style={{display:"flex",gap:28,flexWrap:"wrap",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:11,color:"var(--text3)",marginBottom:7}}>Conditions</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {patient.conditions.map(c=><Badge key={c} label={c} type="info"/>)}
            </div>
          </div>
          <div>
            <div style={{fontSize:11,color:"var(--text3)",marginBottom:7}}>Allergies</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {patient.allergies.map(a=><Badge key={a} label={a} type="danger"/>)}
            </div>
          </div>
          <div>
            <div style={{fontSize:11,color:"var(--text3)",marginBottom:7}}>Blood Type</div>
            <Badge label={patient.blood} type="ok"/>
          </div>
          <div>
            <div style={{fontSize:11,color:"var(--text3)",marginBottom:7}}>Date of Birth</div>
            <span style={{fontSize:13,color:"var(--text2)",fontWeight:500}}>{patient.dob}</span>
          </div>
          <div>
            <div style={{fontSize:11,color:"var(--text3)",marginBottom:7}}>Patient ID</div>
            <span style={{fontSize:13,color:"var(--text2)",fontWeight:500,fontFamily:"monospace"}}>{patient.id}</span>
          </div>
        </div>
      </Card>
    </div>
  );
}

function Records({data}){
  const allTypes=["All",...new Set(data.records.map(r=>r.type))];
  const [filter,setFilter]=useState("All");
  const visible=filter==="All"?data.records:data.records.filter(r=>r.type===filter);
  const fmt=d=>new Date(d).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});
  return(
    <div>
      <div className="filter-wrap">
        {allTypes.map(t=>(
          <button key={t} className={`filter-pill ${filter===t?"active":""}`} onClick={()=>setFilter(t)}>{t}</button>
        ))}
      </div>
      <div className="flex-col">
        {visible.map((r,i)=>(
          <div key={r.id} className="record-row fade-up" style={{animationDelay:`${i*0.06}s`}}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:14}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}>
                  <span style={{fontSize:14,fontWeight:600,color:"var(--text)"}}>{r.doctor}</span>
                  <Badge label={r.type} type="info"/>
                  {r.shared&&<Badge label="Shared" type="ok"/>}
                </div>
                <div style={{fontSize:12,color:"var(--text3)",marginBottom:7}}>{r.hospital} · {fmt(r.date)}</div>
                <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.55}}>{r.summary}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8,flexShrink:0}}>
                <span style={{fontSize:11,color:"var(--text3)"}}>{r.files} files</span>
                <button className="btn-outline">View</button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Vitals({data}){
  const {vitals,bpData}=data;
  const maxS=Math.max(...bpData.map(b=>b.s));
  return(
    <div>
      <div className="grid-auto" style={{marginBottom:20}}>
        {vitals.map((v,i)=>(
          <div key={v.label} className={`vital-card ${v.status==="warn"?"warn":""} fade-up`} style={{animationDelay:`${i*.07}s`}}>
            <div style={{fontSize:20,marginBottom:6}}>{v.icon}</div>
            <div className="vital-val">{v.value}{v.unit&&<span className="vital-unit">{v.unit}</span>}</div>
            <div className="vital-label">{v.label}</div>
            <div style={{marginTop:8}}>
              <Badge label={v.status==="ok"?"Normal":"Monitor"} type={v.status==="ok"?"ok":"warn"}/>
            </div>
          </div>
        ))}
      </div>
      <Card>
        <div className="sec-title">Blood Pressure History — Last 6 Months</div>
        <div className="bar-chart">
          {bpData.map((bp,i)=>(
            <div key={i} className="bar-group">
              <div style={{fontSize:10,color:"var(--text2)",fontWeight:600,marginBottom:3}}>{bp.s}/{bp.d}</div>
              <div className="bar-pair">
                <div className="bar" style={{flex:1,background:"var(--primary)",opacity:.9,height:`${(bp.s/maxS)*100}%`}}/>
                <div className="bar" style={{flex:1,background:"var(--accent2)",opacity:.8,height:`${(bp.d/maxS)*100}%`}}/>
              </div>
              <div className="bar-label">{bp.m}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:16,marginTop:10}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:10,height:10,borderRadius:2,background:"var(--primary)"}}/>
            <span style={{fontSize:11,color:"var(--text3)"}}>Systolic</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:10,height:10,borderRadius:2,background:"var(--accent2)"}}/>
            <span style={{fontSize:11,color:"var(--text3)"}}>Diastolic</span>
          </div>
        </div>
      </Card>
    </div>
  );
}

function Medications({data}){
  const {medications,schedule}=data;
  return(
    <div>
      <div className="flex-col" style={{marginBottom:20}}>
        {medications.map((m,i)=>(
          <Card key={i} className="fade-up" style={{animationDelay:`${i*.08}s`}}>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <div style={{width:50,height:50,borderRadius:12,flexShrink:0,background:"var(--ok-bg)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>💊</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                  <span style={{fontSize:15,fontWeight:600,color:"var(--text)"}}>{m.name}</span>
                  <Badge label={m.dose} type="info"/>
                  <Badge label="Active" type="ok"/>
                </div>
                <div style={{fontSize:13,color:"var(--text2)"}}>{m.freq} · {m.by}</div>
                <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>Duration: {m.dur}</div>
              </div>
            </div>
          </Card>
        ))}
      </div>
      <Card>
        <div className="sec-title">Today's Schedule</div>
        {schedule.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<schedule.length-1?"1px solid var(--border2)":"none"}}>
            <div className={`check-circle ${s.done?"done":""}`}>
              {s.done&&<span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}
            </div>
            <div style={{flex:1,fontSize:13,color:s.done?"var(--text3)":"var(--text)",textDecoration:s.done?"line-through":"none"}}>{s.med}</div>
            <div style={{fontSize:12,color:"var(--text3)",flexShrink:0}}>{s.time}</div>
          </div>
        ))}
      </Card>
    </div>
  );
}

function AccessControl({data}){
  const [accessList,setAccessList]=useState(data.access);
  const toggle=i=>setAccessList(prev=>prev.map((a,idx)=>idx===i?{...a,active:!a.active}:a));
  const dotColor={view:"var(--info)",download:"var(--warn)",revoke:"var(--danger)",upload:"var(--primary)"};
  return(
    <div>
      <div className="info-banner fade-up">
        <span style={{fontSize:24,flexShrink:0}}>🔐</span>
        <div>
          <div style={{fontSize:14,fontWeight:600,color:"var(--ok)",marginBottom:4}}>You own your data</div>
          <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.6}}>
            All medical records are end-to-end encrypted and stored under your sole control.
            Hospitals and providers can only access your data with your explicit permission.
            Revoke access at any time with a single tap.
          </div>
        </div>
      </div>
      <div className="sec-title" style={{marginTop:4}}>Hospital & Provider Access</div>
      <div className="flex-col" style={{marginBottom:20}}>
        {accessList.map((a,i)=>(
          <Card key={i} className="fade-up" style={{animationDelay:`${i*.07}s`}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:46,height:46,borderRadius:10,flexShrink:0,background:a.active?"var(--ok-bg)":"var(--surface3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🏥</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                  <span style={{fontSize:14,fontWeight:600,color:"var(--text)"}}>{a.name}</span>
                  <Badge label={a.level} type={a.active?"ok":"muted"}/>
                </div>
                <div style={{fontSize:12,color:"var(--text3)"}}>{a.role} · Granted {a.granted}</div>
              </div>
              <Toggle on={a.active} onToggle={()=>toggle(i)}/>
            </div>
          </Card>
        ))}
      </div>
      <Card>
        <div className="sec-title">Audit Log</div>
        {data.audit.map((l,i)=>(
          <div key={i} className="audit-row">
            <div className="audit-dot" style={{background:dotColor[l.type]}}/>
            <div style={{flex:1,fontSize:13,color:"var(--text)"}}>{l.msg}</div>
            <div style={{fontSize:11,color:"var(--text3)",flexShrink:0}}>{l.time}</div>
          </div>
        ))}
      </Card>
    </div>
  );
}

function App(){
  const [mode,setMode]=useState("light");
  const [tab,setTab]=useState("dashboard");
  const [currentUser,setCurrentUser]=useState(null);

  const handleLogin=username=>{
    setCurrentUser(username);
    setTab("dashboard");
  };
  const handleLogout=()=>{setCurrentUser(null);setTab("dashboard");};
  const toggleTheme=()=>setMode(m=>m==="light"?"dark":"light");

  useEffect(()=>{document.body.className=mode;},[mode]);

  if(!currentUser) return <LoginPage onLogin={handleLogin}/>;

  const userData=ALL_USERS[currentUser];
  const {patient}=userData;

  const subtitles={
    dashboard:`Welcome back, ${patient.name.split(" ")[0]}. Here's your health at a glance.`,
    records:"All your medical records — owned and controlled by you.",
    vitals:"Track your health metrics over time.",
    medications:"Your current prescriptions and daily schedule.",
    access:"Manage who can view or interact with your health data.",
  };

  const PAGES={
    dashboard:<Dashboard data={userData}/>,
    records:<Records data={userData}/>,
    vitals:<Vitals data={userData}/>,
    medications:<Medications data={userData}/>,
    access:<AccessControl data={userData}/>,
  };

  return(
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-icon">⬡</div>
          <div>
            <div className="logo-name">MediVault</div>
            <div className="logo-sub">Patient Portal</div>
          </div>
        </div>
        <div className="sidebar-patient">
          <AvatarEl initials={patient.avatar}/>
          <div>
            <div className="pt-name">{patient.name}</div>
            <div className="pt-id">{patient.id}</div>
          </div>
        </div>
        <nav className="sidebar-nav">
          {NAV.map(n=>(
            <button key={n.id} className={`nav-btn ${tab===n.id?"active":""}`} onClick={()=>setTab(n.id)}>
              <span className="nav-icon">{n.icon}</span>{n.label}
            </button>
          ))}
        </nav>
        <div className="sidebar-footer">
          <button className="theme-btn" onClick={toggleTheme}>
            <span style={{fontSize:14}}>{mode==="light"?"🌙":"☀️"}</span>
            {mode==="light"?"Dark Mode":"Light Mode"}
          </button>
          <button className="logout-btn" onClick={handleLogout} style={{marginTop:8,width:"100%"}}>
            <span style={{fontSize:14}}>⇤</span>Sign Out
          </button>
        </div>
      </aside>

      <main className="main">
        <div className="page-header">
          <div>
            <div className="page-title">{NAV.find(n=>n.id===tab)?.label}</div>
            <div className="page-sub">{subtitles[tab]}</div>
          </div>
          <div className="header-actions">
            <button className="btn-primary" style={{display:"flex",alignItems:"center",gap:7}}>
              <span style={{fontSize:14}}>↑</span> Share Records
            </button>
            <AvatarEl initials={patient.avatar} size={36}/>
          </div>
        </div>
        <div key={tab+currentUser}>
          {PAGES[tab]}
        </div>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
